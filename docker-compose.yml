services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agrivigil-backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: django-insecure-change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - ./backend:/app
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"

  frontend:
    image: node:20-alpine
    container_name: agrivigil-frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
